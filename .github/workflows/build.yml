name: Build static ffmpeg

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g. v8.0-1)'
        required: true
        default: 'v8.0-1'

jobs:
  package-linux:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v3
      - name: Clean previous downloads
        run: |
          # Remove potentially corrupted downloads from previous runs
          rm -f lame-*.tar.gz openssl-*.tar.gz ffmpeg-*.tar.gz
          rm -rf deps-* build.* artifacts/
      - name: Install dependencies
        run: |
          sudo apt-get update -y && \
          sudo apt-get install -y nasm pkg-config
      - name: Build
        run: ./build-linux.sh
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-${{ env.ARCH }}
          path: artifacts/

  package-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - x86_64
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v3
      - name: Clean previous downloads
        run: |
          # Remove potentially corrupted downloads from previous runs
          rm -f lame-*.tar.gz openssl-*.tar.gz ffmpeg-*.tar.gz
          rm -rf deps-* build.* artifacts/
      - name: Install dependencies
        run: |
          sudo apt-get update -y && \
          sudo apt-get install -y nasm pkg-config mingw-w64
      - name: Build
        run: ./build-windows.sh
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-${{ env.ARCH }}
          path: artifacts/

  release:
    runs-on: ubuntu-latest
    needs:
      - package-linux
      - package-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Make tarballs
        run: |
          mkdir -p artifacts/release/
          # Fix path handling for download-artifact v4 structure
          # Structure is artifacts/<artifact-name>/<files>
          
          cd artifacts
          # For Linux
          for d in ffmpeg-linux-*; do
            if [ -d "$d" ]; then
              echo "Processing $d..."
              
              # Find the actual content folder inside, excluding the parent $d itself
              content_dir=$(find "$d" -mindepth 1 -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
              
              if [ -n "$content_dir" ]; then
                  inner_name=$(basename "$content_dir")
                  echo "Archiving $inner_name from inside $d..."
                  tar czf "release/$inner_name.tar.gz" -C "$d" "$inner_name"
              else
                  # Fallback if structure is flat (no inner folder)
                  echo "No inner folder found, archiving content of $d directly..."
                  # Use the folder name as the archive name
                  tar czf "release/$(basename "$d").tar.gz" -C "$d" .
              fi
            fi
          done
          
          # For Windows
          for d in ffmpeg-windows-*; do
            if [ -d "$d" ]; then
              echo "Processing $d..."
              # Find the actual content folder inside, excluding the parent $d itself
              content_dir=$(find "$d" -mindepth 1 -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
              
              if [ -n "$content_dir" ]; then
                  inner_name=$(basename "$content_dir")
                  echo "Archiving $inner_name from inside $d..."
                  tar czf "release/$inner_name.tar.gz" -C "$d" "$inner_name"
              else
                  echo "No inner folder found, archiving content of $d directly..."
                  tar czf "release/$(basename "$d").tar.gz" -C "$d" .
              fi
            fi
          done
          
          ls -l release/
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/release/*
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
