name: Build static ffmpeg

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

jobs:
  package-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch:
          - x86_64
          - arm64
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update -y && \
          sudo apt-get install -y nasm
      - name: Install ARM64 compiler
        if: env.ARCH == 'arm64'
        run: |
          sudo apt-get update -y && \
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: ./build-linux.sh
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-${{ env.ARCH }}
          path: artifacts/

  package-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - x86_64
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update -y && \
          sudo apt-get install -y nasm mingw-w64
      - name: Build
        run: ./build-windows.sh
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-${{ env.ARCH }}
          path: artifacts/

  release:
    runs-on: ubuntu-latest
    needs:
      - package-linux
      - package-windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Make tarballs
        run: |
          mkdir -p artifacts/release/
          # Fix path handling for download-artifact v4 structure
          # Structure is artifacts/<artifact-name>/<files>
          
          cd artifacts
          # For Linux
          for d in ffmpeg-linux-*; do
            if [ -d "$d" ]; then
              echo "Processing $d..."
              # Inside might be ffmpeg-version-linux-arch folder or direct files
              # Based on build scripts, it creates a folder structure inside artifacts
              
              # Find the actual content folder inside
              content_dir=$(find "$d" -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
              if [ -n "$content_dir" ]; then
                  name=$(basename "$content_dir")
                  tar czf "release/$name.tar.gz" -C "$d" "$name"
              fi
            fi
          done
          
          # For Windows
          for d in ffmpeg-windows-*; do
            if [ -d "$d" ]; then
              echo "Processing $d..."
              content_dir=$(find "$d" -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
              if [ -n "$content_dir" ]; then
                  name=$(basename "$content_dir")
                  tar czf "release/$name.tar.gz" -C "$d" "$name"
              fi
            fi
          done
          
          ls -l release/
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
